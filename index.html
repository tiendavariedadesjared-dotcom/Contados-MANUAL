<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1a17">
<title>Conteo Físico · Variedades Jared</title>
<style>
  :root{
    --ink:#111917;
    --ink-soft:#4b5a55;
    --line:#e3e8e5;
    --bg:#f6f8f7;
    --card:#ffffff;
    --pitch:#128a4b;         /* verde cancha - acento principal */
    --pitch-dk:#0d6c3a;
    --amber:#c77700;         /* faltan */
    --amber-bg:#fff4e2;
    --sky:#1f6feb;           /* sobran */
    --sky-bg:#e9f1ff;
    --slate:#6b7a75;         /* no contados */
    --slate-bg:#eef1f0;
    --ok:#128a4b;            /* coinciden */
    --ok-bg:#e6f5ec;
    --danger:#b3261e;
    --shadow:0 1px 2px rgba(16,30,25,.06),0 2px 8px rgba(16,30,25,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);
    font-size:15px;line-height:1.35;
    padding-bottom:96px;
  }
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none !important}

  /* ---------- Header ---------- */
  /* ---------- Sticky top (header + barra de filtros activos) ---------- */
  .sticky-top{position:sticky;top:0;z-index:40}
  header{
    background:var(--pitch);color:#fff;
    padding:10px 14px;
    box-shadow:0 2px 8px rgba(13,108,58,.25);
  }
  .active-bar{background:var(--card);border-bottom:1px solid var(--line);
    padding:6px 10px;display:flex;gap:6px;align-items:center;overflow-x:auto;scrollbar-width:none}
  .active-bar::-webkit-scrollbar{display:none}
  .ab-label{flex:0 0 auto;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--slate)}
  .ab-chip{flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;background:var(--ok-bg);color:var(--pitch-dk);
    border:1px solid var(--pitch);border-radius:999px;padding:3px 6px 3px 9px;font-size:11px;font-weight:700;white-space:nowrap}
  .ab-chip .x{font-size:14px;font-weight:800;line-height:1}
  .h-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .h-title{font-weight:800;font-size:16px;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
  .h-title small{font-weight:600;opacity:.85;font-size:12px}
  .h-status{font-size:12px;opacity:.95;margin-top:2px}
  .h-sync{font-size:11px;margin-top:3px;font-weight:700;opacity:.95}
  .h-sync.ok{color:#c9f7dd}
  .h-sync.warn{color:#ffe0a3}
  .badge-count{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);
    padding:3px 9px;border-radius:999px;font-weight:700;font-size:12px;white-space:nowrap}

  /* ---------- Controls ---------- */
  .controls{background:var(--bg);
    padding:10px 12px 8px;border-bottom:1px solid var(--line)}
  .search{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:12px;
    font-size:15px;background:var(--card);color:var(--ink)}
  .search:focus{outline:none;border-color:var(--pitch)}
  .chips{display:flex;gap:7px;overflow-x:auto;padding:9px 0 2px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:7px 13px;border-radius:999px;border:1px solid var(--line);
    background:var(--card);color:var(--ink-soft);font-size:13px;font-weight:600;white-space:nowrap}
  .chip.on{background:var(--pitch);border-color:var(--pitch);color:#fff}
  .chip-label{flex:0 0 auto;align-self:center;font-size:11px;font-weight:700;
    text-transform:uppercase;letter-spacing:.4px;color:var(--slate);padding-right:2px}

  .toolbar{display:flex;gap:8px;align-items:center;margin-top:8px}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;flex:1}
  .seg button{flex:1;border:0;background:transparent;padding:9px 6px;font-size:13px;font-weight:700;color:var(--ink-soft)}
  .seg button.on{background:var(--ink);color:#fff}
  .seg.tramite button.on{background:var(--sky)}
  .mini-toggle{flex:0 0 auto;padding:9px 11px;border:1px solid var(--line);border-radius:10px;
    background:var(--card);font-size:12px;font-weight:700;color:var(--ink-soft)}
  .mini-toggle.on{background:var(--pitch);border-color:var(--pitch);color:#fff}
  .mini-toggle .fbadge{background:var(--pitch);color:#fff;border-radius:999px;font-size:10px;
    font-weight:800;padding:0 6px;margin-left:5px;line-height:16px;display:inline-block}
  .mini-toggle.on .fbadge{background:#fff;color:var(--pitch)}

  /* ---------- Filter panel ---------- */
  .filter-panel{margin-top:9px;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:11px;box-shadow:var(--shadow)}
  .filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .fld label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;
    color:var(--slate);margin-bottom:3px}
  .fld select{width:100%;padding:9px 8px;border:1px solid var(--line);border-radius:9px;
    font-size:14px;background:var(--bg);color:var(--ink);font-weight:600}
  .fld select:focus{outline:none;border-color:var(--pitch)}
  .fld select.active{border-color:var(--pitch);background:var(--ok-bg)}
  .filter-panel .clear{margin-top:10px;width:100%;border:1px solid var(--line);background:var(--bg);
    border-radius:9px;padding:9px;font-size:13px;font-weight:700;color:var(--ink-soft)}
  .filter-sec-t{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--slate);margin:2px 0 7px}
  .filter-sec-t.excl{color:var(--amber);margin-top:13px;border-top:1px dashed var(--line);padding-top:11px}
  .excl-row{display:flex;gap:7px;align-items:stretch}
  .excl-row select{flex:1;min-width:0;padding:9px 6px;border:1px solid var(--line);border-radius:9px;background:var(--bg);font-size:13px;font-weight:600;color:var(--ink)}
  .excl-add{flex:0 0 auto;border:1px solid var(--amber);background:var(--amber-bg);color:var(--amber);border-radius:9px;padding:0 12px;font-size:13px;font-weight:800}
  .excl-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .excl-chip{display:inline-flex;align-items:center;gap:5px;background:var(--amber-bg);color:var(--amber);
    border:1px solid var(--amber);border-radius:999px;padding:3px 6px 3px 10px;font-size:11px;font-weight:700}
  .excl-chip .x{font-size:14px;font-weight:800}
  .ab-chip.exc{background:var(--amber-bg);color:var(--amber);border-color:var(--amber)}
  .cmp-filters .search{margin-bottom:8px}
  .cmp-solo{width:100%;margin:2px 0 8px;border:1px solid var(--line);background:var(--card);
    border-radius:10px;padding:10px;font-size:13px;font-weight:800;color:var(--ink-soft)}
  .cmp-solo.on{background:var(--pitch);border-color:var(--pitch);color:#fff}
  .crow-focus{display:inline-block;margin-top:5px;background:transparent;border:1px solid var(--line);
    border-radius:8px;padding:3px 8px;font-size:11px;font-weight:700;color:var(--ink-soft)}
  .crow-btns{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .crow-drop{background:var(--amber-bg);border:1px solid var(--amber);border-radius:8px;
    padding:3px 8px;font-size:11px;font-weight:700;color:var(--amber)}
  .desc-bar{background:var(--amber-bg);border:1px solid var(--amber);border-radius:10px;padding:8px 10px;
    margin-bottom:10px;font-size:12px;font-weight:700;color:var(--amber)}
  .desc-bar button{margin-left:6px;background:var(--card);border:1px solid var(--amber);color:var(--amber);
    border-radius:8px;padding:3px 9px;font-size:12px;font-weight:800}

  /* ---------- Comparativo agrupado por tarjeta ---------- */
  .ccard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px;margin-bottom:10px;box-shadow:var(--shadow)}
  .csizes{margin-top:9px;border-top:1px dashed var(--line);padding-top:4px}
  .csize-row{display:flex;align-items:center;gap:9px;padding:7px 2px 7px 9px;border-left:3px solid transparent}
  .csize-row+.csize-row{border-top:1px solid var(--bg)}
  .csize-row.ok{border-left-color:var(--ok)}
  .csize-row.faltan{border-left-color:var(--amber)}
  .csize-row.sobran{border-left-color:var(--sky)}
  .csize-row.nocont{border-left-color:var(--slate)}
  .csize-row .tal{flex:0 0 auto;min-width:40px;text-align:center}
  .csize-row .cs-tag{flex:0 0 auto}
  .csize-row .cs-nums{flex:1;text-align:right;font-size:12px;color:var(--slate);white-space:nowrap}
  .csize-row .cs-nums .cs-big{font-size:15px;font-weight:800;color:var(--ink)}
  .cc-sum{margin-top:7px;text-align:right;font-size:11px;color:var(--slate)}
  .cc-sum b{color:var(--ink);font-size:13px}

  /* ---------- List ---------- */
  main{padding:6px 12px}
  .group-head{position:sticky;top:172px;z-index:20;background:var(--bg);
    display:flex;align-items:baseline;gap:8px;padding:12px 2px 6px;margin-top:4px}
  .group-head b{font-size:15px}
  .group-head span{font-size:12px;color:var(--slate)}
  .group-head .rule{flex:1;height:1px;background:var(--line);margin-left:4px}

  .card{display:flex;gap:11px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:10px;margin-bottom:9px;box-shadow:var(--shadow);align-items:center}
  .thumb{width:62px;height:62px;flex:0 0 auto;border-radius:10px;overflow:hidden;background:#eef1f0;
    display:flex;align-items:center;justify-content:center;color:var(--slate);font-size:22px}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .info{flex:1;min-width:0}
  .info .team{font-weight:800;font-size:15px;line-height:1.2;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .dor{background:var(--ink);color:#fff;font-size:11px;font-weight:700;border-radius:6px;padding:1px 6px}
  .tal{background:var(--pitch);color:#fff;font-size:11px;font-weight:800;border-radius:6px;padding:1px 7px}
  .meta{font-size:12px;color:var(--ink-soft);margin-top:3px;line-height:1.3}
  .meta .sep{color:var(--line)}
  .extras{font-size:11px;color:var(--slate);margin-top:2px}
  .sysline{font-size:11px;color:var(--slate);margin-top:3px}
  .breakdown{font-size:11px;font-weight:700;margin-top:3px}
  .breakdown .f{color:var(--ink)}
  .breakdown .t{color:var(--sky)}

  .counter{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:4px}
  .cbtns{display:flex;align-items:center;gap:6px}
  .cbtn{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--card);
    font-size:22px;font-weight:700;color:var(--ink);display:flex;align-items:center;justify-content:center;
    line-height:1}
  .cbtn.plus{background:var(--pitch);border-color:var(--pitch);color:#fff}
  .cbtn.plus.tramite{background:var(--sky);border-color:var(--sky)}
  .cbtn:active{transform:scale(.94)}
  .cnum{min-width:34px;text-align:center;font-weight:800;font-size:19px}
  .cnum.counted{color:var(--pitch)}

  .empty{text-align:center;color:var(--slate);padding:40px 20px;font-size:14px}

  /* ---------- Model-grouped card (varias tallas) ---------- */
  .model-card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:10px;margin-bottom:10px;box-shadow:var(--shadow)}
  .mc-head{display:flex;gap:11px;align-items:center}
  .mc-info{flex:1;min-width:0}
  .mc-total{flex:0 0 auto;text-align:right;font-size:10px;color:var(--slate);text-transform:uppercase;letter-spacing:.3px}
  .mc-total b{display:block;font-size:19px;font-weight:800;color:var(--ink);line-height:1.1}
  .mc-total b.counted{color:var(--pitch)}
  .sizes{margin-top:9px;border-top:1px dashed var(--line);padding-top:5px;display:flex;flex-direction:column}
  .size-row{display:flex;align-items:center;gap:10px;padding:6px 2px}
  .size-row+.size-row{border-top:1px solid var(--bg)}
  .size-row .tal{flex:0 0 auto;min-width:40px;text-align:center}
  .sr-mid{flex:1;min-width:0;font-size:11px;font-weight:700}
  .sr-mid .f{color:var(--ink)}
  .sr-mid .t{color:var(--sky)}
  .size-row .cbtns{flex:0 0 auto}

  /* ---------- Contador por lotes (staged) ---------- */
  .card{align-items:flex-start}
  .counter2{margin-top:7px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:7px 8px}
  .size-row .counter2{flex:1;margin-top:0}
  .c2-total{font-size:12px;color:var(--ink-soft);margin-bottom:6px;display:flex;align-items:baseline;gap:7px;flex-wrap:wrap}
  .c2-total b{font-size:17px;color:var(--ink)}
  .c2-total b.counted{color:var(--pitch)}
  .c2-total .breakdown{font-size:11px;color:var(--slate)}
  .c2-stage{display:flex;align-items:center;gap:7px}
  .stg{width:42px;height:42px;flex:0 0 auto;border-radius:11px;border:1px solid var(--line);background:var(--card);
    font-size:24px;font-weight:700;color:var(--ink);display:flex;align-items:center;justify-content:center;line-height:1}
  .stg.plus{background:var(--pitch);border-color:var(--pitch);color:#fff}
  .stg.plus.tramite{background:var(--sky);border-color:var(--sky)}
  .stg:active{transform:scale(.94)}
  .c2-pend{min-width:46px;text-align:center;font-weight:800;font-size:20px;color:var(--slate)}
  .c2-pend.pos{color:var(--pitch)}
  .c2-pend.neg{color:var(--amber)}
  .c2-apply{flex:1;min-height:42px;border:1px solid var(--line);border-radius:11px;background:var(--card);
    color:var(--slate);font-weight:800;font-size:13px;padding:0 8px}
  .c2-apply.ready{background:var(--ink);color:#fff;border-color:var(--ink)}
  .c2-apply:disabled{opacity:.6}

  /* ---------- Footer action bar ---------- */
  .fab{position:fixed;left:0;right:0;bottom:0;z-index:45;background:rgba(246,248,247,.92);
    backdrop-filter:blur(6px);border-top:1px solid var(--line);padding:10px 12px;
    display:flex;gap:8px}
  .fab .btn{flex:1;border:0;border-radius:12px;padding:13px 10px;font-weight:800;font-size:14px}
  .btn-primary{background:var(--pitch);color:#fff}
  .btn-ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);flex:0 0 auto;padding:13px 15px}

  /* ---------- Pause overlay ---------- */
  .pause{position:fixed;inset:0;z-index:60;background:rgba(15,26,23,.94);color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:24px}
  .pause h2{margin:0;font-size:22px}
  .pause p{margin:0;opacity:.8;font-size:14px;max-width:280px}
  .pause .big{font-size:15px;font-weight:800;background:#fff;color:var(--ink);border:0;border-radius:14px;padding:15px 34px}

  /* ---------- Comparison ---------- */
  .cmp{position:fixed;inset:0;z-index:70;background:var(--bg);overflow-y:auto}
  .cmp-head{position:sticky;top:0;z-index:10;background:var(--ink);color:#fff;padding:12px 14px}
  .cmp-head .top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .cmp-head h2{margin:0;font-size:17px;font-weight:800}
  .cmp-back{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;
    border-radius:10px;padding:8px 12px;font-weight:700;font-size:13px}
  .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
  .sm{background:rgba(255,255,255,.1);border-radius:12px;padding:10px 8px;text-align:center}
  .sm b{display:block;font-size:20px;font-weight:800}
  .sm span{font-size:10.5px;opacity:.85;text-transform:uppercase;letter-spacing:.3px}
  .sm.diff b{color:#ffd166}

  .cmp-filters{position:sticky;top:0;background:var(--bg);padding:10px 12px 6px;z-index:9;
    border-bottom:1px solid var(--line)}
  .cmp-body{padding:8px 12px 40px}
  .crow{display:flex;gap:11px;background:var(--card);border:1px solid var(--line);border-left-width:4px;
    border-radius:12px;padding:10px;margin-bottom:8px;box-shadow:var(--shadow)}
  .crow.ok{border-left-color:var(--ok)}
  .crow.faltan{border-left-color:var(--amber)}
  .crow.sobran{border-left-color:var(--sky)}
  .crow.nocont{border-left-color:var(--slate)}
  .crow .thumb{width:52px;height:52px}
  .crow .nums{flex:0 0 auto;text-align:right;font-size:12px;line-height:1.5}
  .crow .nums .big{font-size:17px;font-weight:800}
  .tag{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;
    border-radius:6px;padding:2px 7px;margin-top:3px}
  .tag.ok{background:var(--ok-bg);color:var(--ok)}
  .tag.faltan{background:var(--amber-bg);color:var(--amber)}
  .tag.sobran{background:var(--sky-bg);color:var(--sky)}
  .tag.nocont{background:var(--slate-bg);color:var(--slate)}
  .diff-pos{color:var(--sky)}
  .diff-neg{color:var(--amber)}

  .cmp-actions{display:flex;gap:8px;padding:0 12px 20px}
  .cmp-actions button{flex:1;border-radius:12px;padding:12px;font-weight:800;font-size:14px;border:1px solid var(--line);background:var(--card);color:var(--ink)}
  .cmp-actions .exp{background:var(--pitch);color:#fff;border-color:var(--pitch)}

  /* ---------- Toast / overlay generic ---------- */
  .screen{position:fixed;inset:0;z-index:80;background:var(--bg);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;text-align:center;padding:28px}
  .spinner{width:38px;height:38px;border:3px solid var(--line);border-top-color:var(--pitch);
    border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .screen p{color:var(--ink-soft);font-size:14px;margin:0;max-width:320px}
  .screen .err{color:var(--danger);font-weight:700}
  .screen button{background:var(--pitch);color:#fff;border:0;border-radius:12px;padding:12px 26px;font-weight:800}

  @media (min-width:620px){
    body{max-width:720px;margin:0 auto;background:var(--card)}
    .controls,.group-head,.cmp-filters{background:var(--card)}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>
</head>
<body>

<!-- ====== LOADING / ERROR SCREEN ====== -->
<div id="screen" class="screen">
  <div id="spinner" class="spinner"></div>
  <p id="screenMsg">Conectando con Firebase y leyendo el inventario…</p>
  <button id="screenBtn" class="hidden">Reintentar</button>
</div>

<!-- ====== APP ====== -->
<div id="app" class="hidden">
  <div class="sticky-top">
    <header>
      <div class="h-row">
        <div>
          <div class="h-title">📋 Conteo físico <small>Variedades Jared</small></div>
          <div class="h-status" id="status">—</div>
          <div class="h-sync" id="syncStatus">Conectando…</div>
        </div>
        <div class="badge-count" id="totalBadge">0 uds</div>
      </div>
    </header>
    <div id="activeBar" class="active-bar hidden"></div>
  </div>

  <div class="controls">
    <input id="search" class="search" type="text" inputmode="search" placeholder="Buscar por equipo…" autocomplete="off">
    <div class="chips" id="tallaChips"></div>
    <div class="toolbar">
      <button class="mini-toggle" id="btnFilters">Filtros<span class="fbadge hidden" id="fBadge">0</span></button>
      <button class="mini-toggle" id="soloSinContar">Sin contar</button>
    </div>
    <div class="filter-panel hidden" id="filterPanel"></div>
  </div>

  <main id="list"></main>

  <div class="fab">
    <button class="btn btn-ghost" id="btnPause" title="Pausar">⏸</button>
    <button class="btn btn-primary" id="btnClose">Cerrar conteo y comparar</button>
    <button class="btn btn-ghost" id="btnReset" title="Reiniciar conteo">🗑</button>
  </div>
</div>

<!-- ====== PAUSE OVERLAY ====== -->
<div id="pauseView" class="pause hidden">
  <h2>Conteo en pausa</h2>
  <p>Tu conteo está guardado en este dispositivo. Podés cerrar la pestaña y retomar después.</p>
  <div id="pauseStats" style="font-size:13px;opacity:.8"></div>
  <button class="big" id="btnResume">Reanudar conteo</button>
</div>

<!-- ====== COMPARISON VIEW ====== -->
<div id="cmpView" class="cmp hidden">
  <div class="cmp-head">
    <div class="top">
      <h2>Comparativo</h2>
      <button class="cmp-back" id="cmpBack">← Volver al conteo</button>
    </div>
    <div class="summary" id="cmpSummary"></div>
  </div>
  <div class="cmp-filters">
    <select id="cmpEquipo" class="search"></select>
    <div id="cmpActiveBar" class="active-bar hidden"></div>
    <div class="chips" id="cmpTallaChips"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

/* ============================================================
   ⬇️  PEGÁ AQUÍ TU CONFIG DE FIREBASE (proyecto variedades-jared)
   Usá exactamente el mismo objeto config de tus otras herramientas.
   Podés cambiar "11.0.2" arriba por la versión que usan tus otras tools.
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCi_LuHHxYZWEju23ejbm4rb5NAp_qUjbM",
  authDomain: "variedades-jared.firebaseapp.com",
  projectId: "variedades-jared",
  storageBucket: "variedades-jared.firebasestorage.app",
  messagingSenderId: "132528195391",
  appId: "1:132528195391:web:71a35c2ba22799333f758a"
};
const COLECCION = "jared";
const DOCUMENTO = "datos";
const CAMPO_INV = "inv";
const DOC_BORRADOR = "conteo_borrador";   // documento APARTE para el conteo (nunca toca 'datos'/'inv')
const LS_KEY = "conteo_fisico_jared_v1";
const deviceId = Math.random().toString(36).slice(2) + Date.now().toString(36);
/* ============================================================ */

let db;
let productos = [];                 // inventario cargado al abrir (para mostrar tarjetas)
let estado = { fisico:{}, tramite:{}, pend:{}, ts:{}, resetAt:0, startedAt:null, updatedAt:null };
let ui = { search:"", talla:"__all__", mode:"fisico", soloSinContar:false,
           filters:{}, exclusions:[], excPick:{key:null,val:"__none__"}, panelAbierto:false };
const EMPTY = "__empty__";  // sentinela para "(Sin valor)"

const $ = s => document.querySelector(s);
const el = (id) => document.getElementById(id);

/* -------- localStorage -------- */
function cargarEstado(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const p = JSON.parse(raw); estado = Object.assign({fisico:{},tramite:{}}, p); }
  }catch(e){ console.warn("No se pudo leer el conteo guardado", e); }
  if(!estado.fisico) estado.fisico={};
  if(!estado.tramite) estado.tramite={};
  if(!estado.pend) estado.pend={};
  if(!estado.ts) estado.ts={};
  if(estado.resetAt == null) estado.resetAt = 0;
  // dar marca de tiempo a conteos previos que no la tenían (para protegerlos en la sync)
  const base = estado.updatedAt || Date.now();
  for(const id in estado.fisico){ if(estado.ts[id]==null) estado.ts[id] = base; }
}
function guardarEstado(){
  estado.updatedAt = Date.now();
  if(!estado.startedAt) estado.startedAt = estado.updatedAt;
  guardarLocalSolo();
}
function guardarLocalSolo(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(estado)); }catch(e){ console.warn(e); }
}
const contadoTotal = id => (estado.fisico[id]||0) + (estado.tramite[id]||0);

/* ============================================================
   SINCRONIZACIÓN EN LA NUBE  (documento aparte: jared/conteo_borrador)
   NUNCA toca 'datos' ni 'inv'. Fusiona por variante con marca de tiempo.
   ============================================================ */
let syncActivo = false;
function setSyncStatus(estado_){
  const e = el("syncStatus"); if(!e) return;
  if(estado_==="ok"){ e.textContent = "☁️ Sincronizado"; e.className = "h-sync ok"; }
  else if(estado_==="local"){ e.textContent = "⚠️ Solo en este dispositivo"; e.className = "h-sync warn"; }
  else { e.textContent = "Conectando…"; e.className = "h-sync"; }
}
/* fusión: para cada variante gana la marca de tiempo más reciente; se descarta lo anterior a un reset */
function mergeEstados(a, b){
  const resetAt = Math.max(a.resetAt||0, b.resetAt||0);
  const fisico = {}, ts = {};
  const ids = new Set([...Object.keys(a.fisico||{}), ...Object.keys(b.fisico||{})]);
  for(const id of ids){
    const ta = (a.ts && a.ts[id]) || 0;
    const tb = (b.ts && b.ts[id]) || 0;
    const useA = ta >= tb;
    const t = useA ? ta : tb;
    const val = useA ? (a.fisico||{})[id] : (b.fisico||{})[id];
    if(t <= resetAt) continue;      // anterior a un reset global -> se descarta
    if(val == null) continue;
    fisico[id] = val; ts[id] = t;
  }
  return { fisico, ts, resetAt };
}
function igualConteo(a, b){
  if((a.resetAt||0) !== (b.resetAt||0)) return false;
  const ka = Object.keys(a.fisico||{}), kb = Object.keys(b.fisico||{});
  if(ka.length !== kb.length) return false;
  for(const id of ka){ if((a.fisico||{})[id] !== (b.fisico||{})[id]) return false; }
  return true;
}
let pushTimer = null, pushPend = null;
function pushCloud(snapEstado){
  pushPend = { fisico:snapEstado.fisico, ts:snapEstado.ts, resetAt:snapEstado.resetAt };
  if(pushTimer) return;
  pushTimer = setTimeout(async () => {
    pushTimer = null;
    const s = pushPend;
    try{
      await setDoc(doc(db, COLECCION, DOC_BORRADOR),
        { data: JSON.stringify({ fisico:s.fisico, ts:s.ts, resetAt:s.resetAt, updatedAt:Date.now(), device:deviceId }) },
        { merge:true });
      if(syncActivo) setSyncStatus("ok");
    }catch(e){ console.warn("pushCloud", e); setSyncStatus("local"); }
  }, 600);
}
function empujarConteo(){
  if(!syncActivo) return;
  pushCloud({ fisico:estado.fisico, ts:estado.ts, resetAt:estado.resetAt });
}
function iniciarSync(){
  try{
    onSnapshot(doc(db, COLECCION, DOC_BORRADOR), snap => {
      try{
        let cloud = { fisico:{}, ts:{}, resetAt:0 };
        if(snap.exists() && snap.data().data){
          const c = JSON.parse(snap.data().data);
          cloud = { fisico:c.fisico||{}, ts:c.ts||{}, resetAt:c.resetAt||0 };
        }
        const local = { fisico:estado.fisico, ts:estado.ts, resetAt:estado.resetAt };
        const merged = mergeEstados(local, cloud);
        if(!igualConteo(merged, local)){
          estado.fisico = merged.fisico; estado.ts = merged.ts; estado.resetAt = merged.resetAt;
          guardarLocalSolo();
          renderLista(); actualizarTotales();
        }
        if(!igualConteo(merged, cloud) || (merged.resetAt||0)!==(cloud.resetAt||0)){
          pushCloud(merged);   // la nube estaba vacía o más vieja -> subir lo nuestro
        }
        syncActivo = true;
        setSyncStatus("ok");
      }catch(e){ console.warn("sync snapshot", e); setSyncStatus("local"); }
    }, err => { console.warn("onSnapshot", err); setSyncStatus("local"); });
  }catch(e){ console.warn("iniciarSync", e); setSyncStatus("local"); }
}

/* -------- Firebase (SOLO LECTURA) -------- */
async function leerInventario(){
  const snap = await getDoc(doc(db, COLECCION, DOCUMENTO));
  if(!snap.exists()) throw new Error("El documento no existe.");
  const raw = snap.data()[CAMPO_INV];
  if(raw == null) throw new Error("El campo '"+CAMPO_INV+"' está vacío.");
  const arr = typeof raw === "string" ? JSON.parse(raw) : raw;
  if(!Array.isArray(arr)) throw new Error("El inventario no tiene el formato esperado.");
  return arr;
}

/* -------- Helpers de producto -------- */
/* misma normalización de Dropbox que la app principal (por fotos viejas en crudo) */
function normalizarFotoUrl(url){
  if(!url) return url;
  if(url.indexOf("dropbox.com") >= 0){
    url = url.replace(/[?&]dl=\d/, m => m[0]==="?" ? "?raw=1" : "&raw=1");
    if(url.indexOf("raw=1") < 0){ url += url.indexOf("?")>=0 ? "&raw=1" : "?raw=1"; }
    url = url.replace("www.dropbox.com", "dl.dropboxusercontent.com");
  }
  return url;
}
function fotoPrincipal(p){
  const fs = Array.isArray(p.fotos) ? p.fotos : [];
  const pr = fs.find(f => f && f.principal && f.url);
  const u = (pr && pr.url) || (fs[0] && fs[0].url) || null;
  return u ? normalizarFotoUrl(u) : null;
}
/* devuelve <img> o el placeholder; descarta URLs blob: que no cargan fuera de su página */
function thumbHtmlUrl(url){
  if(!url || /^blob:/i.test(url)) return "👕";
  return `<img loading="lazy" decoding="async" src="${escapeAttr(url)}" alt="">`;
}
/* si una imagen falla al cargar, la reemplaza por el placeholder (nada de ícono roto) */
function attachImgFallback(root){
  if(!root) return;
  root.querySelectorAll("img").forEach(img => {
    img.addEventListener("error", () => {
      const s = document.createElement("span");
      s.textContent = "👕";
      img.replaceWith(s);
    }, { once:true });
  });
}
function extrasStr(p){
  const e = p.extras;
  if(!e || typeof e !== "object") return "";
  return Object.entries(e).map(([k,v]) => `${k}: ${v}`).join(" · ");
}
function nombre(p){
  return [p.eq, p.dor ? "#"+p.dor : "", p.ver, p.col, p.año].filter(Boolean).join(" ");
}

/* Orden de tallas: estándar primero, luego lo demás por orden natural */
const TALLA_ORDER = ["XS","S","M","L","XL","XXL","2XL","XXXL","3XL","4XL"];
function tallaKey(t){
  const T = (t||"").toString().trim().toUpperCase();
  const i = TALLA_ORDER.indexOf(T);
  if(i >= 0) return [0, i, T];
  const n = parseFloat(T);
  if(!isNaN(n)) return [1, n, T];
  return [2, 0, T];
}
function cmpTalla(a,b){
  const ka = tallaKey(a), kb = tallaKey(b);
  for(let i=0;i<3;i++){ if(ka[i]<kb[i]) return -1; if(ka[i]>kb[i]) return 1; }
  return 0;
}

/* -------- Render lista -------- */
function tallasUnicas(){
  const set = new Set(productos.map(p => (p.tal||"—").toString().trim() || "—"));
  return [...set].sort(cmpTalla);
}
/* -------- Filtros dinámicos -------- */
function filterDefs(){
  const defs = [
    {key:"eq",  label:"Equipo"},
    {key:"dor", label:"Dorsal"},
    {key:"ver", label:"Versión"},
    {key:"año", label:"Año"},
    {key:"col", label:"Color"},
  ];
  const exKeys = new Set();
  productos.forEach(p => { if(p.extras && typeof p.extras==="object") Object.keys(p.extras).forEach(k=>exKeys.add(k)); });
  [...exKeys].sort((a,b)=>a.localeCompare(b)).forEach(k => defs.push({key:"ex:"+k, label:k}));
  return defs;
}
function labelDe(key){ const d = filterDefs().find(x=>x.key===key); return d?d.label:key; }
function valorCampo(p, key){
  if(key.startsWith("ex:")){
    const k = key.slice(3);
    return (p.extras && p.extras[k]!=null) ? String(p.extras[k]).trim() : "";
  }
  const v = p[key];
  return v==null ? "" : String(v).trim();
}
function campoTieneVacios(key){ return productos.some(p => valorCampo(p,key)===""); }
function etiquetaVacio(key){ return "(Sin "+labelDe(key).toLowerCase()+")"; }
function etiquetaValor(key,val){ return val===EMPTY ? etiquetaVacio(key) : val; }
function opcionesCampo(key){
  const set = new Set();
  productos.forEach(p => { const v = valorCampo(p,key); if(v) set.add(v); });
  const arr = [...set];
  if(key==="año") arr.sort((a,b)=> (parseFloat(b)||0)-(parseFloat(a)||0) || a.localeCompare(b));
  else arr.sort((a,b)=> a.localeCompare(b, "es", {numeric:true}));
  if(campoTieneVacios(key)) arr.unshift(EMPTY);   // opción "(Sin ...)"
  return arr;
}
function filtrosActivos(){
  return Object.entries(ui.filters).filter(([,v]) => v && v!=="__all__");
}
/* ¿el producto coincide con un valor de filtro (real o EMPTY)? */
function coincideValor(p, key, val){
  const pv = valorCampo(p,key);
  return val===EMPTY ? pv==="" : pv===val;
}
/* Filtros base compartidos por conteo y comparativo (talla, búsqueda, incluir, excluir) */
function pasaFiltrosBase(p){
  const q = ui.search.trim().toLowerCase();
  if(ui.talla !== "__all__" && ((p.tal||"—").toString().trim() || "—") !== ui.talla) return false;
  if(q && !(p.eq||"").toLowerCase().includes(q)) return false;
  for(const [key,val] of filtrosActivos()){ if(!coincideValor(p,key,val)) return false; }
  for(const ex of ui.exclusions){ if(coincideValor(p,ex.key,ex.val)) return false; }
  return true;
}
function renderFilterPanel(){
  const panel = el("filterPanel");
  const defs = filterDefs();

  // --- Incluir (dropdowns) ---
  let html = `<div class="filter-sec-t">Mostrar solo</div><div class="filter-grid">`;
  for(const d of defs){
    const val = ui.filters[d.key] || "__all__";
    const activo = val!=="__all__";
    const opts = opcionesCampo(d.key)
      .map(o => `<option value="${escapeAttr(o)}" ${val===o?"selected":""}>${escapeHtml(etiquetaValor(d.key,o))}</option>`).join("");
    html += `<div class="fld">
      <label>${escapeHtml(d.label)}</label>
      <select data-inc="${escapeAttr(d.key)}" class="${activo?"active":""}">
        <option value="__all__">Todos</option>${opts}
      </select></div>`;
  }
  html += `</div>`;

  // --- Excluir ---
  const pk = ui.excPick.key || defs[0].key;
  const valOpts = opcionesCampo(pk)
    .map(o => `<option value="${escapeAttr(o)}" ${ui.excPick.val===o?"selected":""}>${escapeHtml(etiquetaValor(pk,o))}</option>`).join("");
  html += `<div class="filter-sec-t excl">Excluir (ocultar)</div>
    <div class="excl-row">
      <select id="excKey">${defs.map(d=>`<option value="${escapeAttr(d.key)}" ${pk===d.key?"selected":""}>${escapeHtml(d.label)}</option>`).join("")}</select>
      <select id="excVal"><option value="__none__">Elegí valor…</option>${valOpts}</select>
      <button id="excAdd" class="excl-add">Excluir</button>
    </div>`;
  if(ui.exclusions.length){
    html += `<div class="excl-chips">` + ui.exclusions.map((e,i)=>
      `<button class="excl-chip" data-i="${i}">${escapeHtml(labelDe(e.key))}: ${escapeHtml(etiquetaValor(e.key,e.val))} <span class="x">×</span></button>`).join("") + `</div>`;
  }

  html += `<button class="clear" id="btnLimpiar">Limpiar todos los filtros</button>`;
  panel.innerHTML = html;

  // Incluir
  panel.querySelectorAll("select[data-inc]").forEach(s => s.onchange = () => {
    ui.filters[s.dataset.inc] = s.value; afterFilterChange();
  });
  // Excluir: cambiar campo repuebla valores
  el("excKey").onchange = () => { ui.excPick = {key:el("excKey").value, val:"__none__"}; renderFilterPanel(); };
  el("excVal").onchange = () => { ui.excPick.val = el("excVal").value; };
  el("excAdd").onclick = () => {
    const key = el("excKey").value, val = el("excVal").value;
    if(val==="__none__") return;
    if(!ui.exclusions.some(e=>e.key===key && e.val===val)) ui.exclusions.push({key,val});
    ui.excPick = {key, val:"__none__"};
    afterFilterChange();
  };
  panel.querySelectorAll(".excl-chip").forEach(b => b.onclick = () => {
    ui.exclusions.splice(+b.dataset.i,1); afterFilterChange();
  });
  el("btnLimpiar").onclick = () => { ui.filters={}; ui.exclusions=[]; afterFilterChange(); };
}
function nFiltros(){ return filtrosActivos().length + ui.exclusions.length; }
function actualizarBadge(){
  const n = nFiltros();
  const b = el("fBadge");
  b.textContent = n; b.classList.toggle("hidden", n===0);
  el("btnFilters").classList.toggle("on", n>0);
}

/* Barra pequeña y fija: solo muestra los filtros aplicados, con ✕ para quitarlos */
function chipsActivos(){
  const chips = [];
  if(ui.talla !== "__all__")
    chips.push({txt:`Talla: ${ui.talla}`, cls:"", clear:()=>{ ui.talla="__all__"; renderTallaChips(); syncCmpControls(); }});
  if(ui.search.trim())
    chips.push({txt:`Equipo: ${ui.search.trim()}`, cls:"", clear:()=>{ ui.search=""; if(el("search"))el("search").value=""; syncCmpControls(); }});
  if(ui.soloSinContar)
    chips.push({txt:`Sin contar`, cls:"", clear:()=>{ ui.soloSinContar=false; el("soloSinContar").classList.remove("on"); }});
  for(const [key,val] of filtrosActivos())
    chips.push({txt:`${labelDe(key)}: ${etiquetaValor(key,val)}`, cls:"", clear:()=>{ ui.filters[key]="__all__"; }});
  ui.exclusions.forEach((e,i)=>
    chips.push({txt:`Excluye ${labelDe(e.key)}: ${etiquetaValor(e.key,e.val)}`, cls:"exc", clear:()=>{ ui.exclusions = ui.exclusions.filter(x=>!(x.key===e.key&&x.val===e.val)); }}));
  return chips;
}
function pintarBarra(bar, chips){
  if(!bar) return;
  if(chips.length===0){ bar.classList.add("hidden"); bar.innerHTML=""; return; }
  bar.classList.remove("hidden");
  bar.innerHTML = `<span class="ab-label">Filtros:</span>` +
    chips.map((c,i)=>`<button class="ab-chip ${c.cls}" data-i="${i}">${escapeHtml(c.txt)} <span class="x">×</span></button>`).join("");
  bar.querySelectorAll(".ab-chip").forEach(b => b.onclick = () => { chips[+b.dataset.i].clear(); afterFilterChange(); });
}
function renderActiveBar(){
  const chips = chipsActivos();
  pintarBarra(el("activeBar"), chips);
  pintarBarra(el("cmpActiveBar"), chipsActivos()); // arreglo nuevo por si el otro se consumió
}

function afterFilterChange(){
  actualizarBadge();
  if(ui.panelAbierto || el("filterPanel").innerHTML) renderFilterPanel();
  renderActiveBar();
  renderLista();
  if(!el("cmpView").classList.contains("hidden")) renderComparativo();
}

function renderTallaChips(){
  const cont = el("tallaChips");
  const tallas = tallasUnicas();
  let html = `<span class="chip-label">Talla</span>`;
  html += `<button class="chip ${ui.talla==="__all__"?"on":""}" data-talla="__all__">Todas</button>`;
  html += tallas.map(t => `<button class="chip ${ui.talla===t?"on":""}" data-talla="${escapeAttr(t)}">${escapeHtml(t)}</button>`).join("");
  cont.innerHTML = html;
  cont.querySelectorAll(".chip").forEach(c => c.onclick = () => {
    ui.talla = c.dataset.talla; renderTallaChips(); renderActiveBar(); renderLista();
  });
}

function productosFiltrados(){
  return productos.filter(p => {
    if(!pasaFiltrosBase(p)) return false;
    if(ui.soloSinContar && contadoTotal(p.id) > 0) return false;
    return true;
  });
}

/* clave de modelo = misma agrupación que la app principal (claveModelo):
   eq, col, dor, ver, año + extras ordenados. NO incluye talla, soloTienda ni fechaIngreso. */
function modelKey(p){
  let ex = "";
  if(p.extras && typeof p.extras==="object"){
    ex = Object.keys(p.extras).sort().map(k => k+":"+p.extras[k]).join("|");
  }
  return [p.eq||"", p.col||"", p.dor||"", p.ver||"", p.año||"", ex].join("§");
}

function renderLista(){
  const list = el("list");
  const items = productosFiltrados();

  if(items.length === 0){
    list.innerHTML = `<div class="empty">No hay productos con estos filtros.<br>Probá quitar el filtro de talla o el buscador.</div>`;
    return;
  }

  const tallasVisibles = new Set(items.map(p => (p.tal||"—").toString().trim() || "—"));
  if(tallasVisibles.size >= 2) renderAgrupado(items);
  else renderPlano(items);

  // Conectar botones (sirve para ambos layouts)
  list.querySelectorAll(".stg.plus").forEach(b => b.onclick = () => stage(b.dataset.id, +1));
  list.querySelectorAll(".stg.minus").forEach(b => b.onclick = () => stage(b.dataset.id, -1));
  list.querySelectorAll(".c2-apply").forEach(b => b.onclick = () => aplicar(b.dataset.id));
  attachImgFallback(list);
}

/* Vista PLANA: una tarjeta por producto (cuando se ve una sola talla) */
function renderPlano(items){
  items.sort((a,b) => cmpTalla(a.tal,b.tal) || (a.eq||"").localeCompare(b.eq||"") || (a.dor||"").localeCompare(b.dor||""));
  el("list").innerHTML = items.map(cardHtml).join("");
}

/* Vista AGRUPADA por modelo: una tarjeta con una fila por talla (2+ tallas visibles) */
function renderAgrupado(items){
  const grupos = new Map();
  for(const p of items){
    const k = modelKey(p);
    if(!grupos.has(k)) grupos.set(k, []);
    grupos.get(k).push(p);
  }
  const arr = [...grupos.values()];
  arr.forEach(g => g.sort((a,b)=>cmpTalla(a.tal,b.tal)));
  arr.sort((ga,gb) => {
    const a=ga[0], b=gb[0];
    return (a.eq||"").localeCompare(b.eq||"") || (a.dor||"").localeCompare(b.dor||"")
        || (a.ver||"").localeCompare(b.ver||"") || (a.col||"").localeCompare(b.col||"");
  });
  el("list").innerHTML = arr.map(modelCardHtml).join("");
}

function modelCardHtml(grupo){
  const rep = grupo.find(p => fotoPrincipal(p)) || grupo[0];
  const foto = fotoPrincipal(rep);
  const thumb = thumbHtmlUrl(foto);
  const ex = extrasStr(rep);
  const totalModelo = grupo.reduce((s,p)=>s+contadoTotal(p.id),0);

  const filas = grupo.map(p => `
    <div class="size-row">
      <span class="tal">${escapeHtml((p.tal||"—").toString())}</span>
      ${counterHtml(p.id)}
    </div>`).join("");

  return `
  <div class="model-card" data-model="1">
    <div class="mc-head">
      <div class="thumb">${thumb}</div>
      <div class="mc-info">
        <div class="team">${escapeHtml(rep.eq||"—")}${rep.dor?`<span class="dor">#${escapeHtml(rep.dor)}</span>`:""}</div>
        <div class="meta">${[rep.ver,rep.col,rep.año].filter(Boolean).map(escapeHtml).join(' <span class="sep">·</span> ')||"—"}</div>
        ${ex?`<div class="extras">${escapeHtml(ex)}</div>`:""}
      </div>

function stage(id, delta){
  estado.pend[id] = (estado.pend[id]||0) + delta;
  guardarEstado();
  actualizarPend(id);
}
function aplicar(id){
  const d = estado.pend[id]||0;
  if(!d) return;
  estado.fisico[id] = Math.max(0, (estado.fisico[id]||0) + d);
  estado.ts[id] = Date.now();
  estado.pend[id] = 0;
  guardarEstado();
  empujarConteo();
  actualizarTarjeta(id);
  actualizarPend(id);
  actualizarTotales();
}

  const d = estado.pend[id]||0;
  document.querySelectorAll(`.counter2[data-id="${cssEsc(id)}"]`).forEach(node => {

/* ============================================================
   COMPARATIVO  (re-lee Firebase para el stock más fresco)
   ============================================================ */
function clasificar(contado, sistema){
  if(sistema===0 && contado===0) return "ignorar";
  if(contado === sistema) return "ok";
  if(contado === 0 && sistema > 0) return "nocont";
  if(contado > 0 && contado < sistema) return "faltan";
  return "sobran"; // contado > sistema  (incluye stock 0 en sistema con conteo>0)
}

function construirComparativo(invActual){
  // mapa id -> producto (stock fresco). Normalizamos id a TEXTO para evitar
  // duplicados fantasma (la app guarda id numérico y el conteo lo guarda como texto).
  const sysMap = new Map();
  for(const p of invActual) sysMap.set(String(p.id), p);

  // union de ids (sistema + contados), todos como texto
  const ids = new Set([...sysMap.keys()]);
  for(const k of Object.keys(estado.fisico)) if(estado.fisico[k]>0) ids.add(String(k));
  for(const k of Object.keys(estado.tramite)) if(estado.tramite[k]>0) ids.add(String(k));

  const filas = [];
  let totalContado=0, totalSistema=0;
  for(const id of ids){
    const contado = contadoTotal(id);
    const pSys = sysMap.get(id);
    const sistema = pSys ? (Number(pSys.stk)||0) : 0;
    const cat = clasificar(contado, sistema);
    totalSistema += sistema;
    totalContado += contado;
    if(cat === "ignorar") continue;
    // producto para mostrar: preferir el fresco; si se borró, usar el de la carga inicial
    const prod = pSys || productos.find(x => String(x.id) === id) || {id, eq:"(no está en el sistema)"};
    filas.push({
      id: pSys ? pSys.id : id,   // id real (para el export)
      cat, contado, sistema, diff: contado - sistema, prod,
      fisico: estado.fisico[id]||0, tramite: estado.tramite[id]||0
    });
  }

  // orden: primero las diferencias (nocont, faltan, sobran), luego ok; dentro por talla/equipo
  const rank = {nocont:0, faltan:1, sobran:2, ok:3};
  filas.sort((a,b) => (rank[a.cat]-rank[b.cat]) || cmpTalla(a.prod.tal,b.prod.tal) || (a.prod.eq||"").localeCompare(b.prod.eq||""));

  const conDif = filas.filter(f => f.cat!=="ok").length;
  return { filas, totalContado, totalSistema, conDif };
}

function renderComparativo(){
  let base = cmpData.filas.filter(f => pasaFiltrosBase(f.prod));
  if(cmpSoloContadas){
    const contadas = new Set();
    productos.forEach(p => { if(contadoTotal(p.id) > 0) contadas.add(modelKey(p)); });
    base = base.filter(f => contadas.has(modelKey(f.prod)));
  }
  if(cmpDescartadas.size){
    base = base.filter(f => !cmpDescartadas.has(modelKey(f.prod)));
  }
  const btnSolo = el("cmpSoloContadas");
  if(btnSolo) btnSolo.classList.toggle("on", cmpSoloContadas);
  let totalContado=0, totalSistema=0;
  base.forEach(f => { totalContado += f.contado; totalSistema += f.sistema; });
  const conDif = base.filter(f=>f.cat!=="ok").length;
  const diffNeta = totalContado - totalSistema;

  el("cmpSummary").innerHTML = `
    <div class="sm"><b>${totalContado}</b><span>Contado</span></div>
    <div class="sm"><b>${totalSistema}</b><span>En sistema</span></div>
    <div class="sm diff"><b>${diffNeta>0?"+":""}${diffNeta}</b><span>${conDif} c/diferencia</span></div>`;

  syncCmpControls();
  renderActiveBar();

  const counts = {
    all: base.length,
    dif: base.filter(f=>f.cat!=="ok").length,
    faltan: base.filter(f=>f.cat==="faltan").length,
    sobran: base.filter(f=>f.cat==="sobran").length,
    nocont: base.filter(f=>f.cat==="nocont").length,
    ok: base.filter(f=>f.cat==="ok").length,
  };
  const chips = [
    ["dif","Solo diferencias"],["all","Todas"],["faltan","Faltan"],
    ["sobran","Sobran"],["nocont","No contadas"],["ok","Coinciden"]
  ];
  el("cmpChips").innerHTML = chips.map(([k,lbl]) =>
    `<button class="chip ${cmpFiltro===k?"on":""}" data-f="${k}">${lbl} · ${counts[k]}</button>`).join("");
  el("cmpChips").querySelectorAll(".chip").forEach(c => c.onclick = () => {
    cmpFiltro = c.dataset.f; renderComparativo();
  });

  let visibles = base;
  if(cmpFiltro==="dif") visibles = base.filter(f=>f.cat!=="ok");
  else if(cmpFiltro!=="all") visibles = base.filter(f=>f.cat===cmpFiltro);
  cmpVisibles = visibles;

  const body = el("cmpBody");
  if(visibles.length===0){
    const uds = productos.reduce((s,p)=>s+contadoTotal(p.id),0);
    const vars = productos.filter(p=>contadoTotal(p.id)>0).length;
    let msg;
    if(uds===0){
      msg = `Todavía no hay conteo cargado. Volvé al conteo y sumá algunas variantes.`;
    } else if(base.length===0){
      msg = `Los filtros activos están ocultando todo. Quitá filtros arriba para ver el conteo.`;
    } else if(cmpFiltro==="dif"){
      msg = `✓ No hay diferencias con los filtros actuales.<br><br>Contaste <b>${uds}</b> unidades en <b>${vars}</b> variantes y todo coincide con el sistema.<br><br>Tocá <b>“Coinciden”</b> o <b>“Todas”</b> arriba para ver el detalle del conteo.`;
    } else {
      msg = `No hay productos en esta categoría con los filtros actuales.`;
    }
    body.innerHTML = `<div class="empty">${msg}</div>`;
    return;
  }

  // Agrupar por modelo (tarjeta), igual que el conteo
  const tagText = {ok:"Coincide",faltan:"Faltan",sobran:"Sobran",nocont:"No contada"};
  const rank = {nocont:0, faltan:1, sobran:2, ok:3};
  const grupos = new Map();
  for(const f of visibles){
    const k = modelKey(f.prod);
    if(!grupos.has(k)) grupos.set(k, []);
    grupos.get(k).push(f);
  }
  const cards = [...grupos.values()];
  cards.forEach(g => g.sort((a,b)=>cmpTalla(a.prod.tal,b.prod.tal)));
  cards.sort((ga,gb)=>{
    const ra = Math.min(...ga.map(f=>rank[f.cat])), rb = Math.min(...gb.map(f=>rank[f.cat]));
    return ra-rb || (ga[0].prod.eq||"").localeCompare(gb[0].prod.eq||"");
  });

  body.innerHTML = cards.map((g,idx) => {
    const rep = g.find(f=>fotoPrincipal(f.prod))?.prod || g[0].prod;
    const foto = fotoPrincipal(rep);
    const thumb = thumbHtmlUrl(foto);
    const ex = extrasStr(rep);
    let sc=0, ss=0;
    const filas = g.map(f => {
      sc+=f.contado; ss+=f.sistema;
      const diffCls = f.diff>0?"diff-pos":(f.diff<0?"diff-neg":"");
      const diffTxt = f.diff>0?`+${f.diff}`:`${f.diff}`;
      return `
      <div class="csize-row ${f.cat}">
        <span class="tal">${escapeHtml((f.prod.tal||"—").toString())}</span>
        <span class="cs-tag"><span class="tag ${f.cat}">${tagText[f.cat]}</span></span>
        <span class="cs-nums"><b class="cs-big">${f.contado}</b> vs ${f.sistema} · <span class="${diffCls}" style="font-weight:800">Dif ${diffTxt}</span></span>
      </div>`;
    }).join("");
    const sd = sc-ss;
    return `
    <div class="ccard">
      <div class="mc-head">
        <div class="thumb">${thumb}</div>
        <div class="mc-info">
          <div class="team">${escapeHtml(rep.eq||"—")}${rep.dor?`<span class="dor">#${escapeHtml(rep.dor)}</span>`:""}</div>
          <div class="meta">${[rep.ver,rep.col,rep.año].filter(Boolean).map(escapeHtml).join(' <span class="sep">·</span> ')||"—"}</div>
          ${ex?`<div class="extras">${escapeHtml(ex)}</div>`:""}
          <div class="crow-btns">
            <button class="crow-focus" data-i="${idx}">🎯 solo este modelo</button>
            <button class="crow-drop" data-i="${idx}">🗑 Quitar del reporte</button>
          </div>
        </div>
      </div>
      <div class="csizes">${filas}</div>
      <div class="cc-sum">Modelo: contado <b>${sc}</b> · sistema <b>${ss}</b> · dif <b class="${sd>0?'diff-pos':sd<0?'diff-neg':''}">${sd>0?'+':''}${sd}</b></div>
    </div>`;
  }).join("");
  body.querySelectorAll(".crow-focus").forEach(b => b.onclick = () => focusModel(cards[+b.dataset.i][0].prod));
  body.querySelectorAll(".crow-drop").forEach(b => b.onclick = () => {
    cmpDescartadas.add(modelKey(cards[+b.dataset.i][0].prod));
    renderComparativo();
  });
  if(cmpDescartadas.size){
    const bar = document.createElement("div");
    bar.className = "desc-bar";
    bar.innerHTML = `${cmpDescartadas.size} tarjeta(s) quitada(s) del reporte · <button id="cmpRestaurar">Restaurar todas</button>`;
    body.prepend(bar);
    el("cmpRestaurar").onclick = () => { cmpDescartadas.clear(); renderComparativo(); };
  }
  attachImgFallback(body);
}

function exportarCorrecciones(){
  if(!cmpData){ alert("Primero cerrá el conteo para comparar."); return; }
  // tarjetas (modelos) con al menos una talla contada
  const modelosContados = new Set();
  cmpData.filas.forEach(f => { if(f.contado > 0) modelosContados.add(modelKey(f.prod)); });
  // incluir TODAS las tallas de esas tarjetas (las no contadas quedan en 0), menos las descartadas
  const items = cmpData.filas
    .filter(f => modelosContados.has(modelKey(f.prod)) && !cmpDescartadas.has(modelKey(f.prod)))
    .map(f => ({
    id: f.id,
    eq: f.prod.eq ?? "",
    dor: f.prod.dor ?? "",
    tal: f.prod.tal ?? "",
    ver: f.prod.ver ?? "",
    col: f.prod.col ?? "",
    "año": f.prod["año"] ?? "",
    extras: f.prod.extras || {},
    stk_sistema: f.sistema,
    contado: f.contado,
    nuevo_stk: f.contado,
    delta: f.contado - f.sistema
  }));
  if(items.length===0){ alert("No hay tarjetas contadas para exportar."); return; }
  const cambios = items.filter(i => i.delta !== 0).length;
  const aCero = items.filter(i => i.contado === 0).length;
  if(!confirm(`Se exportarán ${items.length} variantes de las tarjetas que contaste (${cambios} con cambio).`
    + (aCero ? `\n\n⚠️ ${aCero} talla(s) de esas tarjetas que NO contaste se pondrán en 0.` : "")
    + `\n\n¿Continuar?`)) return;
  const payload = {
    tipo: "correccion_inventario_conteo_fisico",
    version: 1,
    generado: new Date().toISOString(),
    instruccion: "Para cada objeto de 'correcciones': buscar en INV el item cuyo id coincida y ESTABLECER su stk = nuevo_stk (valor absoluto, NO sumar delta). Si no se encuentra por id, emparejar por eq+dor+tal+ver+col+año+extras. No modificar ninguna variante que no esté en esta lista. Registrar cada cambio en la bitácora como tipo 'correccion'.",
    total_variantes_contadas: items.length,
    variantes_con_cambio: cambios,
    correcciones: items
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json;charset=utf-8"});
  const a = document.createElement("a");
  const fecha = new Date().toISOString().slice(0,16).replace(/[:T]/g,"-");
  a.href = URL.createObjectURL(blob);
  a.download = `correcciones_conteo_${fecha}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportarCSV(){
  const filas = (cmpVisibles && cmpVisibles.length) ? cmpVisibles : cmpData.filas;
  const head = ["estado","id","equipo","dorsal","talla","version","color","año","extras","contado_fisico","contado_tramite","contado_total","sistema","diferencia"];
  const esc = v => `"${(v==null?"":String(v)).replace(/"/g,'""')}"`;
  const cat = {ok:"COINCIDE",faltan:"FALTAN",sobran:"SOBRAN",nocont:"NO_CONTADA"};
  const rows = filas.map(f => {
    const p=f.prod;
    return [cat[f.cat],f.id,p.eq,p.dor,p.tal,p.ver,p.col,p.año,extrasStr(p),f.fisico,f.tramite,f.contado,f.sistema,f.diff].map(esc).join(",");
  });
  const csv = "\uFEFF"+[head.map(esc).join(","),...rows].join("\r\n");
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  const fecha = new Date().toISOString().slice(0,16).replace(/[:T]/g,"-");
  a.href = URL.createObjectURL(blob);
  a.download = `comparativo_conteo_${fecha}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* -------- Utils de escape -------- */
function escapeHtml(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function escapeAttr(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function cssEsc(s){ return String(s).replace(/["\\]/g,"\\$&"); }

  el("btnReset").onclick = reiniciar;
  el("btnClose").onclick = cerrarYComparar;
  el("cmpBack").onclick = () => { el("cmpView").classList.add("hidden"); el("app").classList.remove("hidden"); renderLista(); };
  el("cmpExport").onclick = exportarCSV;
  el("cmpCorrecciones").onclick = exportarCorrecciones;
  el("cmpNuevo").onclick = reiniciar;
  el("cmpSoloContadas").onclick = () => { cmpSoloContadas = !cmpSoloContadas; renderComparativo(); };
}

init();
</script>
</body>
</html>
